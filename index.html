<style>
  :root {
    --paper: #ece4d3;
    --card: #f6f1e6;
    --ink: #1c2430;
    --ink-soft: #55606f;
    --seal: #b23a2e;
    --seal-soft: #b23a2e1a;
    --brass: #8f6f38;
    --brass-line: #8f6f3855;
    --tick: #3f6b52;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #141a23;
      --card: #1c2430;
      --ink: #e9e2d2;
      --ink-soft: #9aa4b2;
      --seal: #d8664f;
      --seal-soft: #d8664f26;
      --brass: #c7a568;
      --brass-line: #c7a56855;
      --tick: #7fb99a;
    }
  }
  :root[data-theme="dark"] {
    --paper: #141a23;
    --card: #1c2430;
    --ink: #e9e2d2;
    --ink-soft: #9aa4b2;
    --seal: #d8664f;
    --seal-soft: #d8664f26;
    --brass: #c7a568;
    --brass-line: #c7a56855;
    --tick: #7fb99a;
  }
  :root[data-theme="light"] {
    --paper: #ece4d3;
    --card: #f6f1e6;
    --ink: #1c2430;
    --ink-soft: #55606f;
    --seal: #b23a2e;
    --seal-soft: #b23a2e1a;
    --brass: #8f6f38;
    --brass-line: #8f6f3855;
    --tick: #3f6b52;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", "Hiragino Sans GB", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .stage {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 48px 20px 64px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border-radius: 6px;
    box-shadow: 0 1px 2px rgba(0,0,0,.06), 0 12px 32px rgba(28,36,48,.14);
    padding: 40px 30px 28px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    inset: 10px;
    border: 1px solid var(--brass-line);
    border-radius: 3px;
    pointer-events: none;
  }

  .hero {
    text-align: center;
    position: relative;
  }

  .seal {
    width: 76px;
    height: 76px;
    margin: 0 auto 18px;
    border-radius: 50%;
    border: 2px solid var(--seal);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transform: rotate(-9deg);
    animation: stampIn .5s cubic-bezier(.2,1.4,.4,1) both;
    animation-delay: .05s;
  }

  .seal::after {
    content: "";
    position: absolute;
    inset: 6px;
    border: 1px solid var(--seal);
    border-radius: 50%;
    opacity: .55;
  }

  .seal span {
    font-family: "Noto Serif TC", "Songti TC", "PMingLiU", serif;
    font-size: 26px;
    color: var(--seal);
    letter-spacing: 2px;
  }

  @keyframes stampIn {
    0%   { opacity: 0; transform: rotate(-9deg) scale(1.9); }
    60%  { opacity: 1; transform: rotate(-9deg) scale(.94); }
    100% { opacity: 1; transform: rotate(-9deg) scale(1); }
  }

  .eyebrow {
    margin: 0 0 6px;
    font-size: 12px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--brass);
    font-weight: 600;
  }

  h1 {
    margin: 0 0 8px;
    font-family: "Noto Serif TC", "Songti TC", "PMingLiU", serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: .04em;
    text-wrap: balance;
  }

  .org {
    margin: 0;
    font-size: 14px;
    color: var(--ink-soft);
    letter-spacing: .02em;
  }

  .hairline {
    border: none;
    border-top: 1px solid var(--brass-line);
    margin: 26px 0;
  }

  .actions {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .action-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 10px;
    text-decoration: none;
    color: inherit;
    border-radius: 4px;
    transition: background-color .15s ease;
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font: inherit;
  }

  .action-row:hover,
  .action-row:focus-visible {
    background: var(--seal-soft);
  }

  .action-row:focus-visible {
    outline: 2px solid var(--seal);
    outline-offset: 2px;
  }

  .action-icon {
    width: 34px;
    height: 34px;
    flex: none;
    border-radius: 50%;
    background: var(--seal-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .action-text {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  .action-label {
    font-size: 14px;
    font-weight: 600;
  }

  .action-value {
    font-size: 13px;
    color: var(--ink-soft);
    font-family: ui-monospace, "SF Mono", "Cascadia Mono", Consolas, monospace;
    font-variant-numeric: tabular-nums;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .chev {
    color: var(--brass);
    font-size: 18px;
    flex: none;
  }

  .dossier .eyebrow {
    margin-bottom: 14px;
  }

  .credentials {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 11px;
  }

  .credentials li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 14px;
    line-height: 1.5;
  }

  .tick {
    flex: none;
    width: 18px;
    height: 18px;
    margin-top: 1px;
    border-radius: 50%;
    background: color-mix(in srgb, var(--tick) 16%, transparent);
    color: var(--tick);
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .footer {
    margin-top: 30px;
    text-align: center;
  }

  .footer p {
    margin: 0;
  }

  .footer p:first-child {
    font-size: 12px;
    color: var(--ink-soft);
  }

  .tagline {
    margin-top: 6px !important;
    font-family: "Noto Serif TC", "Songti TC", "PMingLiU", serif;
    font-size: 14px;
    color: var(--brass);
  }

  @media (prefers-reduced-motion: reduce) {
    .seal { animation: none; }
  }
</style>
</head>
<body>
<main class="stage">
  <article class="card" aria-label="翁仲昱的數位名片">
    <header class="hero">
      <div class="seal" aria-hidden="true"><span>翁</span></div>
      <p class="eyebrow">企業貸款顧問</p>
      <h1>翁仲昱</h1>
      <p class="org">中租迪和股份有限公司　微企金融部</p>
    </header>

    <hr class="hairline" />

    <nav class="actions" aria-label="聯絡方式">
      <a class="action-row" href="tel:+886910123523">
        <span class="action-icon" aria-hidden="true">📞</span>
        <span class="action-text">
          <span class="action-label">撥打電話</span>
          <span class="action-value">0910-123-523</span>
        </span>
        <span class="chev" aria-hidden="true">›</span>
      </a>
      <a class="action-row" href="https://line.me/ti/p/RIbly0k8iA" target="_blank" rel="noopener">
        <span class="action-icon" aria-hidden="true">💬</span>
        <span class="action-text">
          <span class="action-label">加 LINE 好友</span>
          <span class="action-value">點此加入好友</span>
        </span>
        <span class="chev" aria-hidden="true">›</span>
      </a>
      <button class="action-row" type="button" id="vcard-link">
        <span class="action-icon" aria-hidden="true">＋</span>
        <span class="action-text">
          <span class="action-label">加入聯絡人</span>
          <span class="action-value">儲存 vCard</span>
        </span>
        <span class="chev" aria-hidden="true">›</span>
      </button>
    </nav>

    <hr class="hairline" />

    <section class="dossier">
      <p class="eyebrow">不只是貸款顧問</p>
      <ul class="credentials">
        <li><span class="tick">✓</span>AI ＋ 無人機整合應用（國防／關鍵基礎設施）</li>
        <li><span class="tick">✓</span>資安產品 B2B 開發經驗（GCB、VANS 等）</li>
        <li><span class="tick">✓</span>警大研討會論文作者</li>
        <li><span class="tick">✓</span>台中市電腦公會合作講師</li>
        <li><span class="tick">✓</span>台語精通・在地溝通零距離</li>
      </ul>
    </section>

    <footer class="footer">
      <p>中租迪和股份有限公司｜微企金融部</p>
      <p class="tagline">用科技眼光，看懂你的資金需求</p>
    </footer>
  </article>
</main>

<script>
  (function () {
    var vcard = [
      "BEGIN:VCARD",
      "VERSION:3.0",
      "N:翁;仲昱;;;",
      "FN:翁仲昱",
      "ORG:中租迪和股份有限公司;微企金融部",
      "TITLE:企業貸款顧問",
      "TEL;TYPE=CELL:+886910123523",
      "EMAIL:justinxq110982@gmail.com",
      "URL:https://line.me/ti/p/RIbly0k8iA",
      "END:VCARD"
    ].join("\r\n");

    var link = document.getElementById("vcard-link");
    link.addEventListener("click", function () {
      var blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "翁仲昱.vcf";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(url); }, 4000);
    });
  })();
</script>
</body>
</html>
