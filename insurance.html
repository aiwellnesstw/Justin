<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>中租保險諮詢｜翁仲昱</title>
<meta name="description" content="企業保險諮詢表單，留下資料由翁仲昱親自聯繫。" />
<meta name="theme-color" content="#1c2430" />
<meta name="robots" content="noindex" />

<style>
  :root {
    --paper: #ece4d3;
    --card: #f6f1e6;
    --ink: #1c2430;
    --ink-soft: #55606f;
    --seal: #b23a2e;
    --seal-soft: #b23a2e1a;
    --brass: #8f6f38;
    --brass-line: #8f6f3855;
    --tick: #3f6b52;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #141a23;
      --card: #1c2430;
      --ink: #e9e2d2;
      --ink-soft: #9aa4b2;
      --seal: #d8664f;
      --seal-soft: #d8664f26;
      --brass: #c7a568;
      --brass-line: #c7a56855;
      --tick: #7fb99a;
    }
  }
  :root[data-theme="dark"] {
    --paper: #141a23;
    --card: #1c2430;
    --ink: #e9e2d2;
    --ink-soft: #9aa4b2;
    --seal: #d8664f;
    --seal-soft: #d8664f26;
    --brass: #c7a568;
    --brass-line: #c7a56855;
    --tick: #7fb99a;
  }
  :root[data-theme="light"] {
    --paper: #ece4d3;
    --card: #f6f1e6;
    --ink: #1c2430;
    --ink-soft: #55606f;
    --seal: #b23a2e;
    --seal-soft: #b23a2e1a;
    --brass: #8f6f38;
    --brass-line: #8f6f3855;
    --tick: #3f6b52;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", "Hiragino Sans GB", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .stage {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 48px 20px 64px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border-radius: 6px;
    box-shadow: 0 1px 2px rgba(0,0,0,.06), 0 12px 32px rgba(28,36,48,.14);
    padding: 40px 30px 28px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    inset: 10px;
    border: 1px solid var(--brass-line);
    border-radius: 3px;
    pointer-events: none;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    color: var(--ink-soft);
    text-decoration: none;
    margin-bottom: 18px;
  }
  .back-link:hover { color: var(--seal); }

  .hero { text-align: center; }

  .action-icon-lg {
    width: 52px;
    height: 52px;
    margin: 0 auto 14px;
    border-radius: 50%;
    background: var(--seal-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .eyebrow {
    margin: 0 0 6px;
    font-size: 12px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--brass);
    font-weight: 600;
    text-align: center;
  }

  h1 {
    margin: 0 0 8px;
    font-family: "Noto Serif TC", "Songti TC", "PMingLiU", serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: .04em;
    text-align: center;
  }

  .sub {
    margin: 0;
    font-size: 13px;
    color: var(--ink-soft);
    text-align: center;
    line-height: 1.6;
  }

  .hairline {
    border: none;
    border-top: 1px solid var(--brass-line);
    margin: 26px 0;
  }

  .field { margin-bottom: 20px; }

  .field-label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 10px;
  }

  .field-label .req { color: var(--seal); }

  .chip-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 14px;
    border: 1px solid var(--brass-line);
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    transition: background-color .15s ease, border-color .15s ease;
  }

  .chip.selected {
    background: var(--seal-soft);
    border-color: var(--seal);
    color: var(--seal);
    font-weight: 600;
  }

  .field input[type="text"],
  .field input[type="tel"] {
    width: 100%;
    padding: 12px 14px;
    font-size: 15px;
    border: 1px solid var(--brass-line);
    border-radius: 6px;
    background: var(--paper);
    color: var(--ink);
    font-family: inherit;
  }

  .field input:focus {
    outline: none;
    border-color: var(--seal);
  }

  .submit-btn {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    background: var(--seal);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    transition: opacity .15s ease;
  }

  .submit-btn:disabled {
    opacity: .5;
    cursor: not-allowed;
  }

  .consent {
    margin: 14px 0 0;
    font-size: 11.5px;
    line-height: 1.6;
    color: var(--ink-soft);
    text-align: center;
  }

  .error-msg {
    font-size: 12px;
    color: var(--seal);
    margin: -12px 0 16px;
    display: none;
  }

  .result {
    text-align: center;
    padding: 20px 0;
  }
  .result-emoji { font-size: 40px; margin-bottom: 12px; }
  .result h2 {
    font-family: "Noto Serif TC", "Songti TC", "PMingLiU", serif;
    font-size: 20px;
    margin: 0 0 10px;
  }
  .result p {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.7;
    margin: 0 0 20px;
  }
  .result-back {
    display: inline-block;
    padding: 12px 24px;
    border: 1px solid var(--brass-line);
    border-radius: 6px;
    color: var(--ink);
    text-decoration: none;
    font-size: 14px;
  }
</style>
</head>
<body>
<main class="stage">
  <article class="card" aria-label="中租保險諮詢表單">
    <a class="back-link" href="index.html">‹ 回名片首頁</a>

    <header class="hero">
      <div class="action-icon-lg" aria-hidden="true">🛡️</div>
      <p class="eyebrow">企業保險諮詢</p>
      <h1>中租保險</h1>
      <p class="sub">留下您的需求，專員將親自為您服務</p>
    </header>

    <hr class="hairline" />

    <div id="formView">
      <div class="field">
        <label class="field-label">貴公司想了解哪些保險？<span class="req">*</span></label>
        <div class="chip-grid" id="typeChips">
          <div class="chip" data-val="火險">火險</div>
          <div class="chip" data-val="車險">車險</div>
          <div class="chip" data-val="團險">團險</div>
          <div class="chip" data-val="工程險">工程險</div>
          <div class="chip" data-val="其他">其他</div>
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="taxId">公司統一編號<span class="req">*</span></label>
        <input type="text" id="taxId" inputmode="numeric" maxlength="8" placeholder="請輸入 8 碼統編" />
      </div>

      <div class="field">
        <label class="field-label" for="contactName">聯絡人姓名<span class="req">*</span></label>
        <input type="text" id="contactName" placeholder="請輸入姓名" />
      </div>

      <div class="field">
        <label class="field-label" for="contactPhone">聯絡電話<span class="req">*</span></label>
        <input type="tel" id="contactPhone" placeholder="請輸入手機或市話" />
      </div>

      <p class="error-msg" id="errorMsg">請完整填寫必填欄位</p>

      <button class="submit-btn" id="submitBtn" onclick="submitForm()">送出</button>

      <p class="consent">您所填寫的資料僅供聯繫保險諮詢使用，不會另作他用。</p>
    </div>

    <div id="resultView" class="result" style="display:none;">
      <div class="result-emoji">✅</div>
      <h2>已收到您的資料</h2>
      <p>專員將盡快與您聯繫，說明保險方案內容。</p>
      <a class="result-back" href="index.html">回名片首頁</a>
    </div>
  </article>
</main>

<script>
const SHEET_WEBHOOK = 'https://script.google.com/macros/s/AKfycbzGAIQzvdusQRl5znfxE5KKuwmMUBiLK74vn25VcZK4nMDjDw_lnFDpkZgJWvZflVtaew/exec';
const EMPLOYEE_ID = '20885';

const selectedTypes = new Set();

document.getElementById('typeChips').addEventListener('click', function (e) {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  const val = chip.dataset.val;
  if (selectedTypes.has(val)) {
    selectedTypes.delete(val);
    chip.classList.remove('selected');
  } else {
    selectedTypes.add(val);
    chip.classList.add('selected');
  }
});

async function submitForm() {
  const taxId = document.getElementById('taxId').value.trim();
  const contactName = document.getElementById('contactName').value.trim();
  const contactPhone = document.getElementById('contactPhone').value.trim();
  const errorMsg = document.getElementById('errorMsg');

  if (selectedTypes.size === 0 || !taxId || !contactName || !contactPhone) {
    errorMsg.style.display = 'block';
    return;
  }
  errorMsg.style.display = 'none';

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送出中…';

  const payload = {
    source: 'insurance',
    types: Array.from(selectedTypes).join('、'),
    taxId: taxId,
    contactName: contactName,
    contactPhone: contactPhone,
    employeeId: EMPLOYEE_ID,
  };

  try {
    await fetch(SHEET_WEBHOOK, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
  } catch (_) {}

  document.getElementById('formView').style.display = 'none';
  document.getElementById('resultView').style.display = 'block';
}
</script>
</body>
</html>
